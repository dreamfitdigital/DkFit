<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
<title>DkFit — Copenhagen gym map</title>
<meta name="description" content="Interactive map of gyms and fitness centres across greater Copenhagen — SATS, PureGym, LOOP, FitnessX and more, with prices, opening hours, classes and contact." />
<meta name="theme-color" content="#ffd23f" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23ff7a59'/%3E%3Ctext x='50' y='52' font-size='58' text-anchor='middle' dominant-baseline='central'%3E%F0%9F%8F%8B%EF%B8%8F%3C/text%3E%3C/svg%3E" />
<meta property="og:title" content="DkFit — Copenhagen gym map" />
<meta property="og:description" content="Find gyms across greater Copenhagen on one map — compare prices, opening hours, classes and contact for SATS, PureGym, LOOP, FitnessX and more." />
<meta property="og:type" content="website" />
<meta property="og:image" content="og-cover.png" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:image" content="og-cover.png" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#fdf6e9; --panel:#ffffff; --panel-2:#fff8ed; --ink:#23303b; --muted:#566570;
    --accent:#ff7a59; --accent-2:#19b6c9; --yellow:#ffd23f; --green:#2dc26b; --pink:#ff6f9c;
    --r:16px;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:"Fredoka",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:var(--bg);overflow:hidden}
  a{color:#0f8d9c;text-decoration:none;font-weight:500}
  a:hover{text-decoration:underline}

  #map{position:fixed;inset:0;background:#aadaff;z-index:0}
  .leaflet-control-attribution{background:rgba(255,255,255,.8)!important;border-radius:8px 0 0 0}
  .pin{border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid var(--ink);
    box-shadow:2px 3px 0 rgba(35,48,59,.35);display:grid;place-items:center}
  .pin span{transform:rotate(45deg);font-size:15px;line-height:1}
  .leaflet-marker-icon:focus{outline:none}
  .leaflet-marker-icon:focus-visible{outline:3px solid var(--accent-2);outline-offset:3px;border-radius:8px}
  /* ---------- Near-me control + user marker ---------- */
  .nearme{display:none !important;position:fixed;z-index:600;right:14px;bottom:24px;font-family:inherit;font-weight:600;font-size:14px;
    background:var(--accent-2);color:#fff;border:2.5px solid var(--ink);border-radius:999px;padding:9px 15px;box-shadow:3px 3px 0 var(--ink);cursor:pointer}
  .nearme:active{transform:translate(2px,2px);box-shadow:none}
  .nearme.on{background:#fff;color:var(--ink)}
  .nearme:focus-visible{outline:3px solid var(--ink);outline-offset:2px}
  .userdot{width:16px;height:16px;border-radius:50%;background:#1f6dff;border:3px solid #fff;box-shadow:0 0 0 2px #1f6dff,0 1px 5px rgba(0,0,0,.45)}
  /* ---------- Pin hover tooltip ---------- */
  .leaflet-tooltip.pin-tip{background:#fff;border:2.5px solid var(--ink);border-radius:13px;box-shadow:3px 3px 0 var(--ink);
    padding:8px 11px;font-family:"Fredoka",-apple-system,BlinkMacSystemFont,sans-serif;color:var(--ink);font-weight:500;font-size:12.5px;max-width:240px;white-space:normal}
  .leaflet-tooltip.pin-tip::before{display:none}
  .pin-tip .t-name{font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:6px;margin-bottom:1px}
  .pin-tip .t-dot{width:11px;height:11px;border-radius:50%;border:2px solid var(--ink);flex:none}
  .pin-tip .t-row{color:var(--muted);font-size:12px;margin-top:1px}
  .pin-tip .t-price{color:#13934f;font-weight:700;margin-top:3px}
  .pin-tip .t-price small{color:var(--muted);font-weight:500}
  /* density polygons: remove the default SVG focus-box ("the square") */
  .leaflet-container path.leaflet-interactive:focus,
  .leaflet-container path.leaflet-interactive:focus-visible{outline:none}
  /* zone hover tooltip — fixed comfortable width so text doesn't wrap per-word */
  .leaflet-tooltip.zone-tip{width:230px;max-width:230px;line-height:1.5}
  .zone-tip .zt-name{font-weight:700;font-size:14px;margin-bottom:3px}
  .zone-tip .zt-kind{font-weight:500;color:var(--muted);font-size:12px;text-transform:capitalize}
  .zone-tip .zt-stat{font-size:12.5px;color:var(--ink)}
  .zone-tip .zt-stat b{font-weight:700}

  /* ---------- Left brand navigator ---------- */
  .sidebar{position:fixed;left:16px;top:50%;transform:translateY(-50%);width:230px;z-index:1050;max-height:calc(100vh - 110px);
    background:#fff;border:3px solid var(--ink);border-radius:18px;box-shadow:4px 4px 0 var(--ink);
    display:flex;flex-direction:column;overflow:hidden;transition:width .22s ease}
  .sidebar.collapsed{width:60px}
  .sb-head{display:flex;align-items:center;gap:8px;padding:11px 12px;border-bottom:3px solid var(--ink);background:var(--yellow)}
  .sb-head .sb-mark{width:27px;height:27px;border-radius:8px;background:var(--accent);border:2.5px solid var(--ink);
    display:grid;place-items:center;font-size:14px;transform:rotate(-5deg);flex:none}
  .sb-head h3{margin:0;font-size:18px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden}
  .sb-head h3 .fo{color:var(--accent)}
  .sidebar.collapsed .sb-head{padding:11px 0;justify-content:center}
  .sidebar.collapsed .sb-head h3,.sidebar.collapsed .sb-mark{display:none}
  .sb-toggle{border:2.5px solid var(--ink);background:#fff;color:var(--ink);width:28px;height:28px;border-radius:8px;
    cursor:pointer;font-size:15px;line-height:1;font-weight:700;box-shadow:2px 2px 0 var(--ink);flex:none}
  .sb-toggle:active{transform:translate(2px,2px);box-shadow:none}
  .sb-browse{flex:none;display:grid;place-items:center;width:30px;height:28px;border:2.5px solid var(--ink);
    background:var(--accent-2);color:#fff;border-radius:8px;cursor:pointer;font-size:15px;font-weight:700;
    text-decoration:none;box-shadow:2px 2px 0 var(--ink)}
  .sb-browse:hover{text-decoration:none;background:#15a0b1}
  .sb-browse:active{transform:translate(2px,2px);box-shadow:none}
  .sb-list{overflow-y:auto;overflow-x:hidden;padding:8px;scrollbar-width:none}
  .sb-list::-webkit-scrollbar{display:none}
  .sb-all{width:calc(100% - 4px);text-align:left;font-family:inherit;font-weight:600;font-size:13.5px;cursor:pointer;
    padding:9px 11px;border-radius:10px;border:2.5px solid var(--ink);background:var(--panel-2);color:var(--ink);
    box-shadow:2px 2px 0 var(--ink);margin:2px 2px 8px;white-space:nowrap;overflow:hidden}
  .sb-all.active{background:var(--ink);color:#fff}
  .brand-h{width:calc(100% - 4px);display:flex;align-items:center;gap:8px;font-family:inherit;font-weight:600;font-size:14px;
    cursor:pointer;padding:9px 10px;border-radius:10px;border:2.5px solid var(--ink);background:#fff;color:var(--ink);
    box-shadow:2px 2px 0 var(--ink);margin:0 2px 7px}
  .brand-h:active{transform:translate(2px,2px);box-shadow:none}
  .brand-h.active{background:var(--accent-2);color:#fff}
  .bdot{width:16px;height:16px;border-radius:50%;border:2.5px solid var(--ink);flex:none}
  .brand-h.active .bdot{border-color:#fff}
  .bname{flex:1;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bshort{display:none;font-weight:600}
  .bcount{font-size:11px;background:var(--yellow);color:var(--ink);border:2px solid var(--ink);border-radius:999px;padding:0 6px;font-weight:700}
  .brand-h.active .bcount{background:#fff}
  .sidebar.collapsed .brand-h{justify-content:center;padding:9px 0;gap:0}
  .sidebar.collapsed .bname,.sidebar.collapsed .bcount{display:none}
  .sidebar.collapsed .sb-all{text-align:center;padding:9px 0;font-size:15px}
  .sidebar.collapsed .alltext{display:none}

  /* ---------- Floating detail board ---------- */
  .board{position:fixed;right:18px;top:18px;transform:translateX(120%);
    width:min(380px,calc(100vw - 32px));max-height:calc(100vh - 36px);z-index:1100;
    background:#fff;border:3px solid var(--ink);border-radius:20px;box-shadow:6px 6px 0 var(--ink);
    display:flex;flex-direction:column;transition:transform .28s cubic-bezier(.2,.8,.2,1);overflow:hidden}
  .board.open{transform:translateX(0)}
  .board .bh{padding:13px 14px 12px;border-bottom:3px solid var(--ink);background:var(--yellow)}
  .board .bh-top{display:grid;grid-template-columns:minmax(0,auto) 1fr auto;align-items:center;gap:8px}
  .board .bh h2{margin:0;font-size:24px;font-weight:700;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .board .bh .sub{color:var(--ink);font-size:13px;font-weight:500;margin-top:4px}
  .bclose{justify-self:end;border:3px solid var(--ink);background:#fff;color:var(--ink);
    width:30px;height:30px;border-radius:9px;cursor:pointer;font-size:16px;line-height:1;font-weight:700;box-shadow:2px 2px 0 var(--ink)}
  .bclose:active{transform:translate(2px,2px);box-shadow:none}
  .bcmp{justify-self:center;border:2.5px solid var(--ink);background:var(--accent-2);color:#fff;white-space:nowrap;
    padding:7px 16px;border-radius:999px;cursor:pointer;font-size:13.5px;line-height:1;font-weight:600;box-shadow:2px 2px 0 var(--ink);font-family:inherit}
  .bcmp:active{transform:translate(2px,2px);box-shadow:none}
  .tabs{display:flex;flex-wrap:nowrap;justify-content:safe center;gap:7px;padding:11px 14px 14px;border-bottom:3px solid var(--ink);background:#fff7ec;overflow-x:auto;scrollbar-width:none;cursor:grab;user-select:none;-webkit-user-select:none}
  .tabs::-webkit-scrollbar{display:none}
  .tabs.dragging{cursor:grabbing}
  .tab{flex:0 0 auto;white-space:nowrap;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;padding:0 15px;height:36px;
    display:inline-flex;align-items:center;border-radius:999px;border:2.5px solid var(--ink);background:#fff;color:var(--ink);box-shadow:2px 2px 0 var(--ink)}
  .tab.active{background:var(--accent);color:#fff}
  .tab:active{transform:translate(2px,2px);box-shadow:none}
  .bbody{overflow-y:auto;padding:14px 18px 16px;scrollbar-width:none}
  .bbody::-webkit-scrollbar{display:none}
  .sec{margin-bottom:16px}
  .sec h4{margin:0 0 9px;font-size:12px;letter-spacing:.3px;color:#fff;font-weight:600;background:var(--accent);
    display:inline-block;padding:3px 12px;border-radius:999px;border:2.5px solid var(--ink);box-shadow:2px 2px 0 var(--ink)}
  .ph{width:100%;height:150px;object-fit:cover;border-radius:12px;border:3px solid var(--ink);background:var(--panel-2);margin-bottom:14px;box-shadow:3px 3px 0 var(--ink)}
  .pricebig{font-size:22px;font-weight:700;color:#13934f;margin:-2px 0 6px}
  .psub{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin:13px 0 4px}
  .prow-empty{color:#c2cbd2;font-size:13px;font-weight:500;padding:3px 2px}
  .offer{display:flex;gap:7px;align-items:flex-start;background:#eafff3;border:2.5px solid var(--ink);color:#13632f;
    font-weight:600;font-size:13px;line-height:1.35;padding:9px 11px;border-radius:12px;margin:0 0 14px;box-shadow:2px 2px 0 var(--ink)}
  .offer .offer-when{font-weight:700;white-space:nowrap}
  .offer.expired{background:#f1eee8;color:#8a7f6f;border-color:#bcae98;box-shadow:2px 2px 0 #bcae98}
  .updated{font-size:11px;color:var(--muted);text-align:center;margin-top:8px;font-style:italic}
  .row{display:flex;justify-content:space-between;gap:10px;padding:6px 2px;border-bottom:2px dotted #cdd6dd;font-size:13.5px;font-weight:500}
  .row:last-child{border-bottom:none}
  .row .k{color:var(--muted)} .row .v{text-align:right}
  .price-v{color:#13934f;font-weight:600}
  .hours .today{background:#eafff3;border-radius:8px}
  .hours .today .k{color:#13934f;font-weight:700}
  .tags{display:flex;flex-wrap:nowrap;gap:6px;padding-bottom:5px;overflow-x:auto;scrollbar-width:none;cursor:grab;user-select:none;-webkit-user-select:none}
  .tags::-webkit-scrollbar{display:none}
  .tags.dragging{cursor:grabbing}
  .tags span{flex:0 0 auto;white-space:nowrap;font-size:12px;color:var(--ink);background:var(--panel-2);border:2.5px solid var(--ink);padding:3px 10px;border-radius:999px;font-weight:500;box-shadow:2px 2px 0 var(--ink)}
  .ptabs{display:flex;flex-wrap:nowrap;gap:6px;overflow-x:auto;scrollbar-width:none;margin:10px 0 8px;padding-bottom:5px;cursor:grab;user-select:none;-webkit-user-select:none}
  .ptabs::-webkit-scrollbar{display:none}
  .ptabs.dragging{cursor:grabbing}
  .ptab{flex:0 0 auto;white-space:nowrap;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;padding:5px 13px;border-radius:999px;border:2.5px solid var(--ink);background:#fff;color:var(--ink);box-shadow:2px 2px 0 var(--ink)}
  .ptab.active{background:var(--accent-2);color:#fff}
  .ptab:active{transform:translate(2px,2px);box-shadow:none}
  /* age toggle (30+ / Under 30) */
  .agetabs{display:inline-flex;border:2.5px solid var(--ink);border-radius:999px;overflow:hidden;margin:2px 0 10px;box-shadow:2px 2px 0 var(--ink)}
  .agetab{font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;padding:6px 16px;border:none;background:#fff;color:var(--ink)}
  .agetab+.agetab{border-left:2.5px solid var(--ink)}
  .agetab.active{background:var(--ink);color:#fff}
  .note{color:var(--muted);font-size:12px;font-style:italic;margin-top:7px;font-weight:500}
  .unverified{font-size:12px;color:var(--ink);background:var(--yellow);border:2.5px solid var(--ink);padding:7px 10px;border-radius:10px;margin-top:7px;font-weight:500;box-shadow:3px 3px 0 var(--ink)}
  .cmpsimilar{display:block;width:100%;text-align:center;margin-top:6px;background:var(--accent-2);color:#fff;font-family:inherit;font-weight:600;
    font-size:14.5px;padding:11px;border-radius:12px;border:3px solid var(--ink);box-shadow:3px 3px 0 var(--ink);cursor:pointer}
  .cmpsimilar:hover{background:#15a0b1}
  .cmpsimilar:active{transform:translate(3px,3px);box-shadow:none}

  /* ---------- Inline compare: full panels side by side ---------- */
  body.compare-on .board{display:none}
  .compare-row{position:fixed;right:18px;top:18px;z-index:1150;
    display:flex;gap:14px;align-items:flex-start;max-width:calc(100vw - 270px);overflow-x:auto;padding:4px;
    opacity:0;pointer-events:none;transition:opacity .2s ease;scrollbar-width:none}
  .compare-row::-webkit-scrollbar{display:none}
  body.compare-on .compare-row{opacity:1;pointer-events:auto}
  .cpanel{flex:0 0 auto;width:min(340px,86vw);max-height:calc(100vh - 36px);background:#fff;border:3px solid var(--ink);border-radius:20px;
    box-shadow:6px 6px 0 var(--ink);display:flex;flex-direction:column;overflow:hidden}
  .cpanel .cph{padding:15px 16px 12px;border-bottom:3px solid var(--ink);background:var(--yellow);position:relative}
  .cpanel .cph h2{margin:0 0 2px;font-size:19px;font-weight:700;padding-right:34px}
  .cpanel .cph .sub{font-size:12.5px;font-weight:500;color:var(--ink)}
  .cpanel .cpx{position:absolute;top:12px;right:12px;border:3px solid var(--ink);background:#fff;color:var(--ink);width:28px;height:28px;
    border-radius:8px;cursor:pointer;font-weight:700;font-size:15px;line-height:1;box-shadow:2px 2px 0 var(--ink)}
  .cpanel .cpx:active{transform:translate(2px,2px);box-shadow:none}
  .cpanel .cpb{overflow-y:auto;padding:13px 16px 16px;scrollbar-width:none}
  .cpanel .cpb::-webkit-scrollbar{display:none}
  .cpanel .ctabs{display:flex;flex-wrap:nowrap;gap:7px;padding:10px 14px 13px;border-bottom:3px solid var(--ink);background:#fff7ec;overflow-x:auto;scrollbar-width:none;cursor:grab;user-select:none;-webkit-user-select:none}
  .cpanel .ctabs::-webkit-scrollbar{display:none}
  .cpanel .ctabs.dragging{cursor:grabbing}
  .cpanel.empty{align-items:center;justify-content:center;border-style:dashed;background:#fff8ed;color:var(--muted);
    text-align:center;font-weight:600;font-size:14px;padding:26px;min-height:220px}

  @media (max-width:680px){
    /* brand navigator -> horizontal top bar */
    .sidebar{top:10px;left:10px;right:10px;bottom:auto;width:auto;max-height:none;transform:none;
      flex-direction:row;align-items:stretch;border-radius:14px}
    .sb-head{flex:0 0 auto;border-bottom:none;border-right:3px solid var(--ink);padding:9px 11px}
    .sb-head h3{font-size:16px}
    .sb-toggle{display:none}
    .sb-list{flex:1;display:flex;flex-direction:row;align-items:center;gap:6px;
      overflow-x:auto;overflow-y:hidden;padding:7px 8px}
    .sb-all,.brand-h{flex:0 0 auto;width:auto;margin:0;white-space:nowrap}
    .brand-h .bname,.brand-h .bcount{display:none}   /* show only the 4-letter label */
    .brand-h .bshort{display:inline}
    /* detail -> bottom sheet */
    .board{right:50%;left:auto;top:auto;bottom:10px;transform:translateX(50%) translateY(170%);
      width:calc(100vw - 20px);max-height:66vh}
    .board.open{transform:translateX(50%) translateY(0)}
    /* compare -> full-width panels, swipe horizontally (newest shows first) */
    .compare-row{left:10px;right:10px;top:74px;bottom:10px;max-width:none;
      flex-direction:row;align-items:flex-start;overflow-x:auto;overflow-y:hidden}
    .cpanel{width:86vw;max-height:calc(100vh - 92px)}
    .cpanel.empty{display:none}   /* on mobile the top brand bar is how you add */
  }
  /* ---------- Density / transit overlays ---------- */
  .map-toggles{position:fixed;z-index:1100;top:12px;left:50%;transform:translateX(-50%);display:flex;flex-direction:row;flex-wrap:wrap;justify-content:center;gap:8px;max-width:calc(100vw - 28px)}
  .density-toggle{font-family:inherit;font-weight:600;font-size:14px;
    background:#fff;color:var(--ink);border:2.5px solid var(--ink);border-radius:999px;padding:9px 15px;box-shadow:3px 3px 0 var(--ink);cursor:pointer;white-space:nowrap}
  .density-toggle:active{transform:translate(2px,2px);box-shadow:none}
  .density-toggle.on{background:#fd8d3c;color:#fff}
  #transit-toggle.on{background:#2d9cdb}
  #parking-toggle.on{background:#1a9850}
  #suggest-toggle.on{background:#bd0026}
  #rent-toggle.on{background:#810f7c}
  .density-toggle:focus-visible{outline:3px solid var(--ink);outline-offset:2px}
  .cand{width:30px;height:30px;border-radius:50%;background:#1f6dff;color:#fff;border:2.5px solid #fff;
    box-shadow:0 0 0 2px #1f6dff,2px 2px 0 rgba(35,48,59,.5);display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:14px;font-family:inherit}
  /* right-side panel groups the legend + slider card */
  .rpanel{position:fixed;z-index:600;right:14px;top:14px;display:flex;flex-direction:column;gap:10px;align-items:flex-end;
    max-height:calc(100vh - 28px);overflow:auto;pointer-events:none}
  .rpanel>*{pointer-events:auto}
  .opp-sliders{background:#fff;border:2.5px solid var(--ink);
    border-radius:12px;box-shadow:3px 3px 0 var(--ink);padding:11px 13px;width:236px;font-size:12px;font-weight:600}
  .opp-sliders .os-t{font-weight:800;margin-bottom:7px}
  .opp-sliders label{display:grid;grid-template-columns:1fr 84px 26px;align-items:center;gap:7px;margin:5px 0}
  .opp-sliders input[type=range]{width:84px;accent-color:#bd0026;cursor:pointer}
  .opp-sliders span{text-align:right;font-variant-numeric:tabular-nums}
  .opp-sliders .os-hint{margin-top:7px;font-weight:500;font-size:11px;color:var(--muted);line-height:1.35}
  .stn{width:13px;height:13px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1.5px rgba(35,48,59,.55)}
  .stn.metro{background:#2d9cdb}
  .stn.stog{background:#e2231a}
  .legend{display:none;background:#fff;border:2.5px solid var(--ink);
    border-radius:12px;box-shadow:3px 3px 0 var(--ink);padding:9px 11px;font-size:11.5px;font-weight:600;line-height:1.45;width:200px}
  .legend .lg-t{font-weight:800;margin-bottom:5px}
  .legend .lg-row{display:flex;align-items:center;gap:7px;white-space:nowrap}
  .legend .lg-row i{width:16px;height:14px;border-radius:3px;display:inline-block;border:1px solid rgba(35,48,59,.4)}
  .legend .lg-row i.lg-star{background:#1f6dff;color:#fff;border:none;text-align:center;font-size:10px;line-height:14px}
  @media (max-width:720px){
    /* pills in one horizontal row at the bottom on mobile, scroll sideways */
    .map-toggles{top:auto;bottom:12px;left:50%;transform:translateX(-50%);
      flex-direction:row;flex-wrap:nowrap;align-items:center;gap:6px;
      max-width:calc(100vw - 16px);overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;
      padding:2px;scrollbar-width:none}
    .map-toggles::-webkit-scrollbar{display:none}
    .map-toggles .density-toggle{flex:0 0 auto}
    /* legend + sliders up at the top-right, out of the pills' way */
    .rpanel{top:12px;bottom:auto;right:10px;gap:8px}
    .legend{width:auto;max-width:54vw} .opp-sliders{width:56vw;max-width:240px}
  }
</style>
</head>
<body>
<div id="map"></div>

<aside id="sidebar" class="sidebar">
  <div class="sb-head">
    <span class="sb-mark">🏋️</span>
    <h3 id="sb-title"></h3>
    <a id="browse-link" class="sb-browse" href="compare.html" title="Browse / compare all" style="display:none">≣</a>
    <button id="sb-toggle" class="sb-toggle" aria-label="Collapse">‹</button>
  </div>
  <div id="sb-list" class="sb-list"></div>
</aside>

<div class="map-toggles">
  <button id="density-toggle" class="density-toggle" aria-pressed="false" aria-label="Toggle population density (hex grid)">🗺️ Density</button>
  <button id="districts-toggle" class="density-toggle" aria-pressed="false" aria-label="Toggle district overlay">🏙️ Districts</button>
  <button id="parking-toggle" class="density-toggle" aria-pressed="false" aria-label="Toggle parking and access score">🅿️ Parking &amp; access</button>
  <button id="suggest-toggle" class="density-toggle" aria-pressed="false" aria-label="Toggle site opportunity heatmap">⭐ Suggested sites</button>
  <button id="rent-toggle" class="density-toggle" aria-pressed="false" aria-label="Toggle estimated commercial rent">💰 Rent</button>
  <button id="transit-toggle" class="density-toggle" aria-pressed="false" aria-label="Toggle Metro and S-train stations">🚇 Transit</button>
</div>
<div class="rpanel">
<div id="legend" class="legend" aria-hidden="true"></div>
<div id="opp-sliders" class="opp-sliders" style="display:none">
  <div class="os-t">⭐ Weight the factors</div>
  <label>Population<input type="range" id="w-dem" min="0" max="100" value="40"><span id="v-dem">40</span></label>
  <label>Low competition<input type="range" id="w-cmp" min="0" max="100" value="35"><span id="v-cmp">35</span></label>
  <label>Transport<input type="range" id="w-tr" min="0" max="100" value="25"><span id="v-tr">25</span></label>
  <label>Parking &amp; access<input type="range" id="w-pk" min="0" max="100" value="0"><span id="v-pk">0</span></label>
  <label>Low rent<input type="range" id="w-rent" min="0" max="100" value="0"><span id="v-rent">0</span></label>
  <div class="os-hint">Raise Parking for a car-oriented blend; raise Low rent to favour cheaper areas (better margins).</div>
</div>
</div>
<button id="nearme" class="nearme" aria-label="Find gyms near me">📍 Near me</button>

<div id="board" class="board" role="dialog" aria-labelledby="b-name" aria-hidden="true">
  <div class="bh">
    <div class="bh-top">
      <h2 id="b-name"></h2>
      <button class="bcmp" id="b-compare" title="Compare price &amp; hours">Compare ⚖</button>
      <button class="bclose" id="bclose" aria-label="Close">×</button>
    </div>
    <div class="sub" id="b-sub"></div>
  </div>
  <div id="b-tabs" class="tabs" style="display:none"></div>
  <div class="bbody" id="bbody"></div>
</div>

<div id="compare-row" class="compare-row"></div>

<script src="config.js"></script>
<script src="data.js"></script>
<script src="density.js"></script>
<script>
(function(){
  const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const todayKey = DAYS[new Date().getDay()];
  let brandFilter = null;
  let selectedId = null;
  let compareMode = false;
  let compareList = [];   // brand names; index 0 = the kept panel (stays on the right)
  let compareLoc = {};    // brand -> active location id (for chains with tabs)
  let lastFocus = null;   // element to restore focus to when the board closes
  let userLoc = null, userMarker = null;   // geolocation ("near me")
  let allOff = false;     // "All gyms" pressed again → hide every pin

  const TYPE_COLOR = {
    "CrossFit box":"#ff6f9c","Fitness & class studio":"#ffd23f",
    "Outdoor fitness park":"#2dc26b","Coached fitness course":"#E8511A","Gym & fitness centre":"#ff7a59"
  };
  const BRAND_COLOR = (typeof CONFIG!=='undefined' && CONFIG.brandColors) || {};
  const SHORT_LABEL = (typeof CONFIG!=='undefined' && CONFIG.shortLabels) || {};
  const brandOf = g => g.name.split(" — ")[0];
  const colorFor = g => BRAND_COLOR[brandOf(g)] || TYPE_COLOR[g.type] || "#ff7a59";
  // pill label: short area ("København X" → "Cph X") + street, so duplicate districts are distinguishable
  const shortArea = t => (t||'').replace(/Copenhagen/i,'Cph').replace(/København/i,'Cph');
  const streetOf  = a => { const m=String(a||'').match(/^[^\d,]+/); return m?m[0].trim():''; };
  const pillLabel = g => { const ar=shortArea(g.town), st=streetOf(g.address); return st ? (ar ? ar+' · '+st : st) : ar; };
  // hover tooltip: price only
  function tipHtml(g){ return `<div class="t-price">${esc(g.priceMonthly||'—')}</div>`; }
  const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  // ---- Branding from CONFIG ----
  document.title = CONFIG.title + (CONFIG.tagline ? ' — ' + CONFIG.tagline : ' — fitness map');
  (function(){ const el=document.getElementById('sb-title'); const t=CONFIG.title||'Fit';
    if(el) el.innerHTML = '<span class="fo">'+esc(t.slice(0,2))+'</span>'+esc(t.slice(2)); })();

  // ---- Map ----
  const FOCUS_ZOOM = CONFIG.focusZoom || 15;
  const map = L.map('map', {
    zoomControl:false,
    zoomSnap:0,             // continuous — smooth zoom, no jerky jumps
    zoomDelta:1,
    wheelPxPerZoomLevel:72, // gentle, controllable wheel zoom
    minZoom:CONFIG.minZoom||10, maxZoom:CONFIG.maxZoom||16
  }).setView(CONFIG.center, CONFIG.zoom);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:'abcd', maxZoom:19
  }).addTo(map);

  function icon(g, active){
    const sz = active?42:34;
    return L.divIcon({ className:'',
      html:`<div class="pin" style="width:${sz}px;height:${sz}px;background:${colorFor(g)};${active?'box-shadow:3px 4px 0 rgba(35,48,59,.45);':''}"><span>🏋️</span></div>`,
      iconSize:[sz,sz], iconAnchor:[sz/2,sz] });
  }

  function actGym(g){ if(compareMode){ compareLoc[brandOf(g)]=g.id; addCompare(brandOf(g)); } else selectLocation(g.id); }
  // make a marker's element keyboard-focusable & named (re-run after every setIcon, which recreates the element)
  function applyPinA11y(g){
    const el = markers[g.id] && markers[g.id].getElement(); if(!el) return;
    el.setAttribute('tabindex', allOff?'-1':'0'); el.setAttribute('role','button');
    el.setAttribute('aria-hidden', allOff?'true':'false');
    el.setAttribute('aria-label', `${brandOf(g)} — ${pillLabel(g)}${g.priceMonthly?', '+g.priceMonthly:''}`);
    el.style.pointerEvents = allOff ? 'none' : '';
    el.onkeydown = (e)=>{ if(e.key==='Enter' || e.key===' '){ e.preventDefault(); actGym(g); } };
  }
  function applyAllPinA11y(){ GYMS.forEach(applyPinA11y); }
  const markers = {};
  GYMS.forEach(g=>{
    const m = L.marker(g.coords, {icon:icon(g,false)}).addTo(map);
    m.bindTooltip(tipHtml(g), {direction:'top', offset:[0,-32], opacity:1, className:'pin-tip'});
    m.on('click', ()=>actGym(g));
    markers[g.id] = m;
  });
  map.on('click', ()=>{ if(compareMode) exitCompare(); else if(!allOff) resetToAll(); });

  // ---- Data overlays: density (hex), districts, parking&access, transit ----
  window.CAR_STR = c=>'●'.repeat(c)+'○'.repeat(5-c);
  window.CAR_LBL = c=>['—','very hard','hard','moderate','easy','very easy'][c]||'—';
  window.PK_LBL = s=> s>=75?'excellent':s>=60?'good':s>=45?'fair':s>=30?'poor':'very poor';
  (function overlays(){
    if(typeof DENSITY==='undefined') return;
    const grades=[0,1000,2500,5000,7500,10000,15000];
    const colors=['#fef0d9','#fdd49e','#fdae6b','#fd8d3c','#f16913','#d94801','#8c2d04'];
    const colFor=d=>{ for(let i=grades.length-1;i>=0;i--){ if(d>=grades[i]) return colors[i]; } return colors[0]; };
    // parking & access score 0–100 (high = better): red→green
    const pGrades=[0,25,40,55,70,85];
    const pColors=['#d73027','#fc8d59','#fee08b','#d9ef8b','#91cf60','#1a9850'];
    const pColFor=s=>{ for(let i=pGrades.length-1;i>=0;i--){ if(s>=pGrades[i]) return pColors[i]; } return pColors[0]; };
    // site-opportunity heatmap 0–100 (high = best): YlOrRd (dark red = hottest)
    const oGrades=[0,20,35,50,65,80];
    const oColors=['#ffffb2','#fed976','#feb24c','#fd8d3c','#f03b20','#bd0026'];
    const oColFor=s=>{ for(let i=oGrades.length-1;i>=0;i--){ if(s>=oGrades[i]) return oColors[i]; } return oColors[0]; };
    const oLbl=s=> s>=65?'prime':s>=50?'strong':s>=35?'moderate':s>=20?'weak':'poor';
    // commercial-rent estimate DKK/m²/yr (BuPu, dark = pricier)
    const rGrades=[0,600,800,1200,1800,2200];
    const rColors=['#edf8fb','#bfd3e6','#9ebcda','#8c96c6','#8856a7','#810f7c'];
    const rColFor=r=>{ for(let i=rGrades.length-1;i>=0;i--){ if(r>=rGrades[i]) return rColors[i]; } return rColors[0]; };
    const fmt=n=>n==null?'—':Number(n).toLocaleString('en-GB');
    const carStr=window.CAR_STR, carLbl=window.CAR_LBL, pkLbl=window.PK_LBL;

    // Kontur hex — population density
    const hexLayer=L.geoJSON(DENSITY,{ renderer:L.canvas({padding:0.5}),
      style:f=>({fillColor:colFor(f.properties.d),fillOpacity:.72,stroke:false}),
      onEachFeature:(f,lyr)=>{ const p=f.properties;
        lyr.bindTooltip(`<div class="zt-stat"><b>${fmt(p.d)}</b> residents/km²</div>`+
          `<div class="zt-stat" style="opacity:.7">≈${fmt(p.p)} in this 0.6&nbsp;km² cell</div>`+
          `<div class="zt-stat">🚗 Car: <b>${carStr(p.c)}</b> ${carLbl(p.c)}</div>`,
          {sticky:true,className:'pin-tip zone-tip',opacity:1});}
    });
    // Kontur hex — parking & access score
    const parkLayer=L.geoJSON(DENSITY,{ renderer:L.canvas({padding:0.5}),
      style:f=>({fillColor:pColFor(f.properties.s),fillOpacity:.74,stroke:false}),
      onEachFeature:(f,lyr)=>{ const p=f.properties;
        lyr.bindTooltip(`<div class="zt-stat">🅿️ Parking &amp; access: <b>${p.s}</b>/100 (${pkLbl(p.s)})</div>`+
          `<div class="zt-stat" style="opacity:.7">${fmt(p.d)} residents/km² · 🚗 ${carStr(p.c)}</div>`,
          {sticky:true,className:'pin-tip zone-tip',opacity:1});}
    });
    // Kontur hex — estimated commercial rent (DKK/m²/yr)
    const rentLayer=L.geoJSON(DENSITY,{ renderer:L.canvas({padding:0.5}),
      style:f=>({fillColor:rColFor(f.properties.r),fillOpacity:.74,stroke:false}),
      onEachFeature:(f,lyr)=>{ const p=f.properties;
        lyr.bindTooltip(`<div class="zt-stat">💰 Est. rent: <b>~${fmt(p.r)}</b> kr/m²/yr</div>`+
          `<div class="zt-stat" style="opacity:.7">gym-realistic, area estimate · ${fmt(p.d)} residents/km²</div>`,
          {sticky:true,className:'pin-tip zone-tip',opacity:1});}
    });
    // District overlay (bydele + municipalities)
    const zoneLayer=L.geoJSON(typeof ZONES!=='undefined'?ZONES:{type:'FeatureCollection',features:[]},{
      style:f=>({fillColor:colFor(f.properties.density),fillOpacity:.58,color:'#23303b',weight:1,opacity:.5}),
      onEachFeature:(f,lyr)=>{ const p=f.properties;
        lyr.bindTooltip(`<div class="zt-name">${esc(p.name)} <span class="zt-kind">${esc(p.kind)}</span></div>`+
          `<div class="zt-stat"><b>${fmt(p.density)}</b> /km² · <b>${fmt(p.pop)}</b> residents</div>`+
          `<div class="zt-stat">${p.gyms} gym${p.gyms===1?'':'s'}`+(p.per_gym?` · <b>${fmt(p.per_gym)}</b> ppl/gym`:'')+`</div>`+
          `<div class="zt-stat">🚗 Car: <b>${carStr(p.car)}</b> ${carLbl(p.car)} · 🅿️ ${p.pk}/100</div>`,
          {sticky:true,className:'pin-tip zone-tip',opacity:1});}
    });
    // Kontur hex — site-opportunity heatmap, live-weighted (demand + low competition + transport + parking)
    const oppW={dem:40,cmp:35,tr:25,pk:0,rent:0};
    const rentN=r=>Math.max(0,Math.min(100,Math.round((2500-r)/20)));   // cheaper rent → higher score
    const oppScore=p=>{ const t=oppW.dem+oppW.cmp+oppW.tr+oppW.pk+oppW.rent||1;
      return Math.round((oppW.dem*p.dem+oppW.cmp*p.cmp+oppW.tr*p.tr+oppW.pk*p.s+oppW.rent*rentN(p.r))/t); };
    const oppStyle=f=>({fillColor:oColFor(oppScore(f.properties)),fillOpacity:.76,stroke:false});
    const oppLayer=L.geoJSON(DENSITY,{ renderer:L.canvas({padding:0.5}), style:oppStyle,
      onEachFeature:(f,lyr)=>{ lyr.bindTooltip(()=>{ const p=f.properties, o=oppScore(p);
        const T=oppW.dem+oppW.cmp+oppW.tr+oppW.pk+oppW.rent||1;
        const parts=[['Population',oppW.dem,p.dem],['Low competition',oppW.cmp,p.cmp],['Transport',oppW.tr,p.tr],['Parking',oppW.pk,p.s],['Low rent',oppW.rent,rentN(p.r)]];
        const rows=parts.filter(x=>x[1]>0).map(x=>`<div class="zt-stat" style="opacity:.85">${x[0]}: <b>+${Math.round(x[1]*x[2]/T)}</b> <span style="opacity:.6">(${x[2]}/100 · w${x[1]})</span></div>`).join('');
        return `<div class="zt-stat">⭐ Site opportunity: <b>${o}</b>/100 (${oLbl(o)})</div>`+
          (rows||`<div class="zt-stat" style="opacity:.7">set weights with the sliders</div>`)+
          `<div class="zt-stat" style="opacity:.6;margin-top:2px">${p.n1} gym${p.n1===1?'':'s'} within 1 km · est. rent ~${fmt(p.r)} kr/m²/yr</div>`;},
        {sticky:true,className:'pin-tip zone-tip',opacity:1});}
    });
    let oppRaf=null;
    function recolorOpp(){ if(map.hasLayer(oppLayer)) oppLayer.setStyle(oppStyle); }
    function onSlide(){ const ids={dem:'w-dem',cmp:'w-cmp',tr:'w-tr',pk:'w-pk',rent:'w-rent'};
      for(const k in ids){ const el=document.getElementById(ids[k]); if(el){ oppW[k]=+el.value; const v=document.getElementById('v-'+k); if(v) v.textContent=el.value; } }
      if(oppRaf) cancelAnimationFrame(oppRaf); oppRaf=requestAnimationFrame(recolorOpp);
    }
    ['w-dem','w-cmp','w-tr','w-pk','w-rent'].forEach(id=>{ const el=document.getElementById(id); if(el) el.addEventListener('input',onSlide); });
    // Transit stations (Metro + S-train)
    const staLayer=L.layerGroup((typeof STATIONS!=='undefined'?STATIONS:[]).map(s=>{
      const metro=s.net==='Metro';
      const m=L.marker([s.lat,s.lng],{icon:L.divIcon({className:'',html:`<div class="stn ${metro?'metro':'stog'}"></div>`,iconSize:[13,13],iconAnchor:[6.5,6.5]}),zIndexOffset:300,keyboard:false});
      m.bindTooltip(`<b>${esc(s.n)}</b><br>${metro?'Metro':'S-train'} station`,{direction:'top',offset:[0,-8],className:'pin-tip',opacity:1});
      return m;
    }));

    const legend=document.getElementById('legend');
    legend.style.cursor='pointer'; legend.title='Tap to hide';
    legend.addEventListener('click',()=>{ legend.style.display='none'; });
    function renderLegend(){
      let h='';
      if(mode==='hex'||mode==='zone'){ h+='<div class="lg-t">Residents / km²</div>'+grades.map((g,i)=>{
          const nx=grades[i+1]; return `<div class="lg-row"><i style="background:${colors[i]}"></i>${fmt(g)}${nx?'–'+fmt(nx):'+'}</div>`;}).join('')
        +'<div class="lg-row" style="margin-top:5px">🚗 = car-access (●○, 1–5)</div>'; }
      if(mode==='park'){ h+='<div class="lg-t">Parking &amp; access (0–100)</div>'+pGrades.slice().map((g,i)=>{
          const nx=pGrades[i+1]; return `<div class="lg-row"><i style="background:${pColors[i]}"></i>${g}${nx?'–'+nx:'+'}</div>`;}).reverse().join('')
        +'<div class="lg-row" style="margin-top:4px;opacity:.75">parking + low traffic + motorway</div>'; }
      if(mode==='opp'){ h+='<div class="lg-t">Site opportunity (0–100)</div>'+oGrades.slice().map((g,i)=>{
          const nx=oGrades[i+1]; return `<div class="lg-row"><i style="background:${oColors[i]}"></i>${g}${nx?'–'+nx:'+'}</div>`;}).reverse().join('')
        +'<div class="lg-row" style="margin-top:4px;opacity:.75">density + low competition + transit</div>'; }
      if(mode==='rent'){ h+='<div class="lg-t">Est. rent (kr/m²/yr)</div>'+rGrades.slice().map((g,i)=>{
          const nx=rGrades[i+1]; return `<div class="lg-row"><i style="background:${rColors[i]}"></i>${fmt(g)}${nx?'–'+fmt(nx):'+'}</div>`;}).reverse().join('')
        +'<div class="lg-row" style="margin-top:4px;opacity:.75">gym-realistic, Colliers/Savills bands</div>'; }
      if(transit){ h+='<div class="lg-row" style="margin-top:5px"><i style="background:#2d9cdb;border-radius:50%"></i>Metro</div>'
        +'<div class="lg-row"><i style="background:#e2231a;border-radius:50%"></i>S-train</div>'; }
      legend.innerHTML=h; const show=!!(mode||transit);
      legend.style.display=show?'block':'none'; legend.setAttribute('aria-hidden', show?'false':'true');
    }
    let mode=null, transit=false;
    const dBtn=document.getElementById('density-toggle'),
          zBtn=document.getElementById('districts-toggle'),
          pBtn=document.getElementById('parking-toggle'),
          sBtn=document.getElementById('suggest-toggle'),
          rBtn=document.getElementById('rent-toggle'),
          tBtn=document.getElementById('transit-toggle');
    function setMode(m){ mode=(mode===m)?null:m;
      [hexLayer,zoneLayer,parkLayer,oppLayer,rentLayer].forEach(l=>map.removeLayer(l));
      if(mode==='hex') hexLayer.addTo(map);
      if(mode==='zone') zoneLayer.addTo(map);
      if(mode==='park') parkLayer.addTo(map);
      if(mode==='opp') oppLayer.addTo(map);
      if(mode==='rent') rentLayer.addTo(map);
      if(transit){ map.removeLayer(staLayer); staLayer.addTo(map); }   // keep stations on top
      dBtn.classList.toggle('on',mode==='hex'); dBtn.setAttribute('aria-pressed',String(mode==='hex'));
      zBtn.classList.toggle('on',mode==='zone'); zBtn.setAttribute('aria-pressed',String(mode==='zone'));
      pBtn.classList.toggle('on',mode==='park'); pBtn.setAttribute('aria-pressed',String(mode==='park'));
      if(sBtn){ sBtn.classList.toggle('on',mode==='opp'); sBtn.setAttribute('aria-pressed',String(mode==='opp')); }
      if(rBtn){ rBtn.classList.toggle('on',mode==='rent'); rBtn.setAttribute('aria-pressed',String(mode==='rent')); }
      const sp=document.getElementById('opp-sliders'); if(sp) sp.style.display=(mode==='opp')?'block':'none';
      renderLegend();
    }
    function setTransit(){ transit=!transit;
      if(transit) staLayer.addTo(map); else map.removeLayer(staLayer);
      tBtn.classList.toggle('on',transit); tBtn.setAttribute('aria-pressed',String(transit));
      renderLegend();
    }
    dBtn.onclick=()=>setMode('hex');
    if(zBtn) zBtn.onclick=()=>setMode('zone');
    if(pBtn) pBtn.onclick=()=>setMode('park');
    if(sBtn) sBtn.onclick=()=>setMode('opp');
    if(rBtn) rBtn.onclick=()=>setMode('rent');
    if(tBtn) tBtn.onclick=setTransit;
  })();

  // ---- Near me (geolocation): user marker, recenter, distance-sorted tabs + distance in board ----
  const distKm = (a,b)=>{ const R=6371, toR=x=>x*Math.PI/180;
    const dLat=toR(b[0]-a[0]), dLng=toR(b[1]-a[1]);
    const s=Math.sin(dLat/2)**2 + Math.cos(toR(a[0]))*Math.cos(toR(b[0]))*Math.sin(dLng/2)**2;
    return 2*R*Math.asin(Math.sqrt(s)); };
  const fmtDist = km => km<1 ? Math.round(km*1000)+' m' : km.toFixed(km<10?1:0)+' km';
  const nearmeBtn = document.getElementById('nearme');
  nearmeBtn.onclick = ()=>{
    if(!navigator.geolocation){ nearmeBtn.textContent='📍 Not supported'; return; }
    nearmeBtn.textContent='📍 Locating…';
    navigator.geolocation.getCurrentPosition(pos=>{
      userLoc=[pos.coords.latitude, pos.coords.longitude];
      nearmeBtn.textContent='📍 Near me'; nearmeBtn.classList.add('on');
      if(userMarker) userMarker.setLatLng(userLoc);
      else userMarker=L.marker(userLoc,{icon:L.divIcon({className:'',html:'<div class="userdot"></div>',iconSize:[16,16],iconAnchor:[8,8]}),interactive:false,keyboard:false,zIndexOffset:1000}).addTo(map);
      map.setView(userLoc, Math.max(map.getZoom(),13), {animate:true});
      tabsEl._sig=null;                       // force tab strip to re-sort by distance
      if(selectedId) openBoard(selectedId, false);
    }, err=>{
      nearmeBtn.textContent = err.code===1 ? '📍 Permission denied' : '📍 Unavailable';
      setTimeout(()=>{ nearmeBtn.textContent='📍 Near me'; }, 2600);
    }, {enableHighAccuracy:true, timeout:8000, maximumAge:60000});
  };

  const allBounds = L.latLngBounds(GYMS.map(g=>g.coords));
  map.fitBounds(allBounds, {padding:[70,70], maxZoom: CONFIG.fitMaxZoom || CONFIG.zoom || 12});

  // ---- Brand groups ----
  const brands = [];
  const brandMap = {};
  GYMS.forEach(g=>{ const b=brandOf(g); if(!brandMap[b]){brandMap[b]=[]; brands.push(b);} brandMap[b].push(g); });

  // ---- Left navigator (brands only) ----
  const listEl = document.getElementById('sb-list');
  const allItem = document.createElement('button');
  allItem.className = 'sb-all active';
  allItem.innerHTML = '★<span class="alltext"> All gyms</span>';
  allItem.onclick = ()=>{
    exitCompare();
    // if we're already showing the full "all gyms" view, a second press hides every pin
    if(!brandFilter && !selectedId && !allOff){
      allOff = true; closeBoard(); setBrandActive(null);
      allItem.classList.remove('active');
      setActivePins();
    } else {
      resetToAll(true);   // from a brand, a selection, or the hidden state → show all again
    }
  };
  listEl.appendChild(allItem);

  const headEls = {};
  brands.forEach(b=>{
    const h = document.createElement('button'); h.className='brand-h';
    h.innerHTML = `<span class="bdot" style="background:${colorFor(brandMap[b][0])}"></span><span class="bname">${esc(b)}</span><span class="bshort">${esc(SHORT_LABEL[b]||b.slice(0,4))}</span><span class="bcount">${brandMap[b].length}</span>`;
    h.onclick = ()=>{ compareMode ? addCompare(b) : selectBrand(b); };
    headEls[b] = h; listEl.appendChild(h);
  });

  // ---- Shared selection state (keeps map + nav + detail in sync) ----
  function setBrandActive(b){
    allItem.classList.toggle('active', !b);
    Object.entries(headEls).forEach(([k,e])=>e.classList.toggle('active', k===b));
  }
  function setActivePins(){
    GYMS.forEach(g=>{
      markers[g.id].setIcon(icon(g, g.id===selectedId));
      markers[g.id].setOpacity(allOff ? 0 : (matches(g)?1:0.3));
    });
    applyAllPinA11y();
  }
  function matches(g){ return !brandFilter || brandOf(g)===brandFilter; }

  function resetToAll(fly){
    allOff = false; brandFilter = null; selectedId = null;
    setBrandActive(null); closeBoard();
    setActivePins();
    if(fly) map.flyToBounds(allBounds, {padding:[70,70], maxZoom:10, duration:.6});
  }
  function selectBrand(b){
    brandFilter = b; setBrandActive(b);
    openBoard(brandMap[b][0].id, false);   // detail with location tabs
    setActivePins();
    // (no map move — just highlight the selected brand, keep current view)
  }
  function selectLocation(id){
    const g = GYMS.find(x=>x.id===id); if(!g) return;
    brandFilter = brandOf(g); setBrandActive(brandFilter);
    openBoard(id, true);
    setActivePins();
  }


  // ---- Collapsible sidebar (slim strip) ----
  const sidebar = document.getElementById('sidebar');
  const sbToggle = document.getElementById('sb-toggle');
  function setCollapsed(c){ sidebar.classList.toggle('collapsed', c); sbToggle.textContent = c?'›':'‹'; sbToggle.setAttribute('aria-label', c?'Expand brand list':'Collapse brand list'); }
  sbToggle.onclick = ()=>setCollapsed(!sidebar.classList.contains('collapsed'));
  setCollapsed(false);   // desktop starts expanded; mobile uses the horizontal bar (CSS)
  if (CONFIG.features && CONFIG.features.comparePage) {
    const bl = document.getElementById('browse-link'); if (bl) bl.style.display = '';
  }

  // ---- Detail board ----
  const board = document.getElementById('board');
  const tabsEl = document.getElementById('b-tabs');
  document.getElementById('bclose').onclick = ()=>resetToAll();
  document.getElementById('b-compare').onclick = ()=>{ if(selectedId){ const g=GYMS.find(x=>x.id===selectedId); enterCompare(brandOf(g), selectedId); } };

  function buildTabs(brand, activeId){
    const group = brandMap[brand] || [];
    // only show this brand's locations within the current map view (+ the active one)
    let inView = [];
    if(group.length >= 2){
      const b = map.getBounds();
      inView = group.filter(g => b.contains(g.coords));
      if(activeId && !inView.some(g=>g.id===activeId)){ const a=group.find(g=>g.id===activeId); if(a) inView=[a].concat(inView); }
      if(userLoc) inView = inView.slice().sort((a,b)=>distKm(userLoc,a.coords)-distKm(userLoc,b.coords));
    }
    const show = inView.length >= 2;
    // skip the rebuild when nothing changed, so panning doesn't flicker or reset scroll
    const sig = show ? (brand+'|'+activeId+'|'+inView.map(g=>g.id).join(',')) : 'hidden';
    if(tabsEl._sig === sig) return;
    tabsEl._sig = sig;
    if(!show){ tabsEl.style.display='none'; tabsEl.innerHTML=''; return; }
    tabsEl.innerHTML = '';
    inView.forEach(g=>{
      const t = document.createElement('button');
      t.className = 'tab'+(g.id===activeId?' active':'');
      t.textContent = pillLabel(g);
      t.onclick = (ev)=>{ ev.stopPropagation(); selectLocation(g.id); };
      tabsEl.appendChild(t);
    });
    tabsEl.style.display = 'flex';
    centerActivePill(tabsEl);
  }
  // click-and-drag to scroll a pill strip horizontally (mouse); a drag won't trigger the pill click
  function enableDragScroll(el){
    let down=false, startX=0, startScroll=0, moved=false, captured=false, pid=null;
    el.addEventListener('pointerdown', e=>{ if(e.pointerType!=='mouse') return; down=true; moved=false; captured=false; pid=e.pointerId; startX=e.clientX; startScroll=el.scrollLeft; });
    el.addEventListener('pointermove', e=>{ if(!down) return; const dx=e.clientX-startX;
      if(!moved && Math.abs(dx)>4){ moved=true; el.classList.add('dragging'); try{ el.setPointerCapture(pid); captured=true; }catch(_){} }
      if(moved) el.scrollLeft = startScroll - dx; });
    const end=()=>{ if(!down) return; down=false; el.classList.remove('dragging'); if(captured){ try{el.releasePointerCapture(pid);}catch(_){} captured=false; } };
    el.addEventListener('pointerup', end); el.addEventListener('pointercancel', end);
    // swallow only the click that ends an actual drag, so taps still select
    el.addEventListener('click', e=>{ if(moved){ e.stopPropagation(); e.preventDefault(); moved=false; } }, true);
  }
  function centerActivePill(el){ const at=el.querySelector('.tab.active'); if(at){ el.scrollLeft = at.offsetLeft - (el.clientWidth - at.offsetWidth)/2; } }
  // apply drag-scroll to every horizontal pill strip inside a rendered detail block
  function wireScrollers(root){ root.querySelectorAll('.tags, .ptabs').forEach(enableDragScroll); }
  // price sub-tab switching (delegated → works in the detail board and in compare panels)
  document.addEventListener('click', e=>{
    const t = e.target.closest('.ptab'); if(!t) return;
    const wrap = t.closest('.pricewrap'); if(!wrap) return;
    const key = t.getAttribute('data-pg');
    wrap.querySelectorAll('.ptab').forEach(b=>b.classList.toggle('active', b===t));
    wrap.querySelectorAll('.pgroup').forEach(pg=>{ pg.style.display = pg.getAttribute('data-pg')===key ? '' : 'none'; });
  });
  // age toggle (30+ / Under 30) — switches which age pane (each holds its own price tabs) is shown
  document.addEventListener('click', e=>{
    const t = e.target.closest('.agetab'); if(!t) return;
    const wrap = t.closest('.agewrap'); if(!wrap) return;
    const age = t.getAttribute('data-age');
    wrap.querySelectorAll('.agetab').forEach(b=>b.classList.toggle('active', b===t));
    wrap.querySelectorAll('.agepane').forEach(p=>{ p.style.display = p.getAttribute('data-age')===age ? '' : 'none'; });
  });
  enableDragScroll(tabsEl);
  // refresh the tab strip to the viewport as the map pans/zooms (debounced; rebuild only if the set changed)
  let tabTimer=null;
  map.on('moveend', ()=>{ clearTimeout(tabTimer); tabTimer=setTimeout(()=>{
    const bd=document.getElementById('board'); if(bd && bd.classList.contains('open') && selectedId){ const g=GYMS.find(x=>x.id===selectedId); if(g) buildTabs(brandOf(g), selectedId); }
  }, 140); });

  function hoursRows(g){
    if(!DAYS.some(d=>g.hours&&g.hours[d])){
      const note = (g.hours&&g.hours.note) || 'See website.';
      // "open" notes (24/7 etc.) get the same highlight as the today row
      if(/24\/7|24 ?hour|always open|open 24/i.test(note))
        return `<div class="row today"><span class="k">Every day</span><span class="v">${esc(note.replace(/\.$/,''))}</span></div>`;
      return `<div class="note">${esc(note)}</div>`;
    }
    const wk = ["Mon","Tue","Wed","Thu","Fri"];
    const rows = [];
    // collapse consecutive identical weekdays (Mon–Fri) into ranges
    for(let i=0;i<wk.length;){
      const v = g.hours[wk[i]] || '—';
      let j = i;
      while(j+1<wk.length && (g.hours[wk[j+1]]||'—')===v) j++;
      const days = wk.slice(i,j+1);
      rows.push({ label: i===j ? wk[i] : `${wk[i]}–${wk[j]}`, v, today: days.includes(todayKey) });
      i = j+1;
    }
    // Saturday and Sunday on their own
    ["Sat","Sun"].forEach(d=> rows.push({ label:d, v:g.hours[d]||'—', today:d===todayKey }));
    return rows.map(r=>
      `<div class="row ${r.today?'today':''}"><span class="k">${r.label}${r.today?' · today':''}</span><span class="v">${esc(r.v)}</span></div>`).join('');
  }
  function priceRows(g){
    return (g.prices||[]).map(p=>`<div class="row"><span class="k">${esc(p.label)}</span><span class="v price-v">${esc(p.value)}</span></div>`).join('');
  }
  function fmtDate(iso){ const d=new Date(iso+'T00:00:00'); return isNaN(d)?iso:d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
  function priceGroups(g){
    const rows = arr => arr.map(p=>`<div class="row"><span class="k">${esc(p.label)}</span><span class="v price-v">${esc(p.value)}</span></div>`).join('');
    const mk = subsArr => {   // one pricewrap (Subscriptions / Prepaid / Courses tabs) for a given subs set
      const groups = [
        {key:'subs',    label:'Subscriptions', arr:subsArr||[]},
        {key:'passes',  label:'Prepaid',       arr:g.passes||[]},
        {key:'courses', label:'Courses',       arr:g.courses||[]}
      ].filter(gr=>gr.arr.length);
      if(!groups.length) return '';
      if(groups.length === 1) return rows(groups[0].arr);
      const tabs = `<div class="ptabs">${groups.map((gr,i)=>`<button class="ptab${i===0?' active':''}" data-pg="${gr.key}">${esc(gr.label)}</button>`).join('')}</div>`;
      const bodies = groups.map((gr,i)=>`<div class="pgroup" data-pg="${gr.key}"${i===0?'':' style="display:none"'}>${rows(gr.arr)}</div>`).join('');
      return `<div class="pricewrap">${tabs}${bodies}</div>`;
    };
    if(g.subsU30 && g.subsU30.length){   // age-based pricing → 30+ / Under 30 toggle, each with its own Subscriptions + Prepaid
      return `<div class="agewrap">`+
        `<div class="agetabs"><button class="agetab active" data-age="o30">30+</button><button class="agetab" data-age="u30">Under 30</button></div>`+
        `<div class="agepane" data-age="o30">${mk(g.subscriptions)}</div>`+
        `<div class="agepane" data-age="u30" style="display:none">${mk(g.subsU30)}</div>`+
      `</div>`;
    }
    return mk(g.subscriptions);
  }
  function offerHtml(g){
    if(!g.offer) return '';
    let tag='', cls='offer';
    if(g.offerExpires){
      const days = Math.ceil((new Date(g.offerExpires+'T23:59:59') - new Date())/86400000);
      if(days < 0){ cls='offer expired'; tag=' · expired '+fmtDate(g.offerExpires); }
      else if(days === 0){ tag=' · ends today'; }
      else { tag=' · '+days+' day'+(days>1?'s':'')+' left'; }
    }
    return `<div class="${cls}"><span>🎁</span><span>${esc(g.offer)}<span class="offer-when">${esc(tag)}</span></span></div>`;
  }
  function detailHtml(g){
    let html = '';
    html += `<div class="sec"><div class="pricebig">${esc(g.priceMonthly||'—')}</div>${priceGroups(g)}</div>`;
    html += `<div class="sec hours"><h4>${g.classOnly?'Class times':'Opening hours'}</h4>${hoursRows(g)}`;
    if(g.hours && g.hours.note && DAYS.some(d=>g.hours[d])) html += `<div class="note">${esc(g.hours.note)}</div>`;
    html += `</div>`;
    if(g.classes && g.classes.length)
      html += `<div class="sec"><h4>Classes</h4><div class="tags">${g.classes.map(c=>`<span>${esc(c)}</span>`).join('')}</div></div>`;
    if(g.amenities && g.amenities.length)
      html += `<div class="sec"><h4>Amenities</h4><div class="tags">${g.amenities.map(a=>`<span>${esc(a)}</span>`).join('')}</div></div>`;
    if(typeof GYM_CAR!=='undefined' && GYM_CAR[g.id]){ const gc=GYM_CAR[g.id];
      html += `<div class="sec"><h4>Getting there</h4>`+
        `<div class="row"><span class="k">Car access</span><span class="v" title="Modelled from local population density (congestion/parking proxy)">${window.CAR_STR(gc.car)} ${window.CAR_LBL(gc.car)}</span></div>`+
        `<div class="row"><span class="k">Parking &amp; access</span><span class="v" title="Parking supply + low traffic + motorway proximity">${gc.pk}/100 (${window.PK_LBL(gc.pk)})</span></div>`+
        `<div class="row"><span class="k">Nearest rail</span><span class="v">${esc(gc.stnet)} — ${esc(gc.stn)} · ${gc.stkm} km</span></div></div>`;
    }
    html += `<div class="sec"><h4>Contact</h4>`;
    if(g.address) html += `<div class="row"><span class="k">Address</span><span class="v">${esc(g.address)}</span></div>`;
    if(userLoc)   html += `<div class="row"><span class="k">Distance</span><span class="v">${esc(fmtDist(distKm(userLoc,g.coords)))} away</span></div>`;
    if(g.phone)   html += `<div class="row"><span class="k">Phone</span><span class="v"><a href="tel:${esc(g.phone.replace(/\s/g,''))}">${esc(g.phone)}</a></span></div>`;
    if(g.email)   html += `<div class="row"><span class="k">Email</span><span class="v"><a href="mailto:${esc(g.email)}">${esc(g.email)}</a></span></div>`;
    if(g.website) html += `<div class="row"><span class="k">Website</span><span class="v"><a href="${esc(g.website)}" target="_blank" rel="noopener">${esc(g.website.replace(/^https?:\/\//,'').replace(/\/$/,''))}</a></span></div>`;
    if(g.facebook) html += `<div class="row"><span class="k">${/instagram/.test(g.facebook)?'Instagram':'Facebook'}</span><span class="v"><a href="${esc(g.facebook)}" target="_blank" rel="noopener">Page ↗</a></span></div>`;
    const gmaps = `https://www.google.com/maps/dir/?api=1&destination=${g.coords[0]},${g.coords[1]}`;
    const gquery = encodeURIComponent(g.name + ' ' + (g.address || g.town || ''));
    html += `<div class="row"><span class="k">Directions</span><span class="v"><a href="${gmaps}" target="_blank" rel="noopener">Open in Maps ↗</a></span></div>`;
    html += `<div class="row"><span class="k">Google</span><span class="v"><a href="https://www.google.com/maps/search/?api=1&query=${gquery}" target="_blank" rel="noopener">Reviews &amp; photos ↗</a></span></div></div>`;
    html += offerHtml(g);
    if(g.photo) html += `<img class="ph" src="${esc(g.photo)}" alt="${esc(g.name)}" onerror="this.style.display='none'" style="margin-top:4px">`;
    if(g.notes) html += `<div class="sec"><h4>About</h4><div style="font-size:13.5px;color:#3b4a57;font-weight:500">${esc(g.notes)}</div></div>`;
    if(!g.verified) html += `<div class="unverified">⚠︎ Some details unconfirmed — please verify with the gym.</div>`;
    if(typeof DATA_UPDATED!=='undefined') html += `<div class="updated">Data last updated ${esc(fmtDate(DATA_UPDATED))}</div>`;
    return html;
  }

  function openBoard(id, fly){
    const g = GYMS.find(x=>x.id===id); if(!g) return;
    allOff = false;   // showing a gym always un-hides the pins
    selectedId = id;
    if(fly) map.panTo(g.coords, {animate:true, duration:.5});  // move to the pin, keep current zoom

    buildTabs(brandOf(g), id);
    document.getElementById('b-name').textContent = brandOf(g);
    document.getElementById('b-sub').textContent = `${g.type} · ${g.town}`;

    const body = document.getElementById('bbody');
    body.innerHTML = detailHtml(g);
    wireScrollers(body);
    body.scrollTop = 0;
    const wasOpen = board.classList.contains('open');
    board.classList.add('open');
    board.setAttribute('aria-hidden','false');
    // remember what to return focus to, and move focus into the dialog on first open
    if(!wasOpen){ lastFocus = document.activeElement; document.getElementById('bclose').focus(); }
  }

  function closeBoard(){
    if(!board.classList.contains('open')) return;
    board.classList.remove('open'); board.setAttribute('aria-hidden','true'); selectedId = null;
    if(lastFocus && lastFocus.focus){ try{ lastFocus.focus(); }catch(_){}} lastFocus = null;
  }

  // ---- Inline compare: brand panels anchored right, added via the left nav ----
  // compareList holds brand names; index 0 = the kept panel (stays on the right).
  const compareRow = document.getElementById('compare-row');

  function comparePanel(brand){
    const group = brandMap[brand];
    const id = compareLoc[brand] || group[0].id;
    const g = GYMS.find(x=>x.id===id);
    const tabs = group.length > 1
      ? `<div class="ctabs">${group.map(x=>`<button class="tab${x.id===id?' active':''}" data-tab="${esc(brand)}__${esc(x.id)}">${esc(pillLabel(x))}</button>`).join('')}</div>` : '';
    return `<div class="cpanel">
      <div class="cph"><button class="cpx" data-rm="${esc(brand)}" aria-label="Remove">×</button>
        <h2>${esc(brand)}</h2><div class="sub">${esc(g.type)} · ${esc(g.town)}</div></div>
      ${tabs}
      <div class="cpb">${detailHtml(g)}</div></div>`;
  }
  function renderCompare(){
    // kept (index 0) on the right -> reverse so it renders last; empty hint sits at far left
    const panels = compareList.slice().reverse().map(comparePanel).join('');
    const empty = compareList.length < 3 ? `<div class="cpanel empty">＋ Pick a brand on the left<br>to compare it here</div>` : '';
    compareRow.innerHTML = empty + panels;
    compareRow.querySelectorAll('[data-rm]').forEach(btn=>btn.onclick=(e)=>{ e.stopPropagation(); removeCompare(btn.getAttribute('data-rm')); });
    compareRow.querySelectorAll('[data-tab]').forEach(btn=>btn.onclick=(e)=>{ e.stopPropagation();
      const [b,i]=btn.getAttribute('data-tab').split('__'); compareLoc[b]=i; renderCompare(); });
    compareRow.querySelectorAll('.ctabs').forEach(el=>{ enableDragScroll(el); centerActivePill(el); });
    wireScrollers(compareRow);
    const set = new Set();
    compareList.forEach(b=>brandMap[b].forEach(x=>set.add(x.id)));
    GYMS.forEach(g=>{ markers[g.id].setIcon(icon(g, set.has(g.id))); markers[g.id].setOpacity(set.size? (set.has(g.id)?1:0.3) : 1); });
    applyAllPinA11y();
  }
  function enterCompare(brand, locId){
    compareMode = true;
    compareList = brand ? [brand] : [];
    if(brand && locId) compareLoc[brand] = locId;
    closeBoard();
    document.body.classList.add('compare-on');
    renderCompare();
  }
  function addCompare(brand){
    if(compareList.includes(brand)){ renderCompare(); return; }
    if(compareList.length >= 3) return;   // up to 3 side by side
    compareList.push(brand);              // newest renders to the left; kept stays on the right
    renderCompare();
  }
  function removeCompare(brand){
    compareList = compareList.filter(b=>b!==brand);
    if(!compareList.length){ exitCompare(); return; }
    renderCompare();
  }
  function exitCompare(){
    if(!compareMode) return;
    compareMode = false; compareList = [];
    document.body.classList.remove('compare-on');
    compareRow.innerHTML = '';
    setActivePins();
  }

  // Escape closes compare / detail
  document.addEventListener('keydown', e=>{
    if(e.key!=='Escape') return;
    if(compareMode) exitCompare();
    else if(board.classList.contains('open')) resetToAll();
  });

  // initial state
  setActivePins();

  // Deep-link: open a location if ?focus=<id>
  const fid = new URLSearchParams(location.search).get('focus');
  if(fid && GYMS.some(g=>g.id===fid)) setTimeout(()=>selectLocation(fid), 400);
})();
</script>
</body>
